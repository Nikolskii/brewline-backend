# Релиз контракта: пушим тег api-types-v<версия> → пакет уезжает в npm.
# Отдельный тег (а не общий релиз backend) — потому что у пакета своя версия,
# не совпадающая с версией backend (ADR 0009).

name: publish-api-types

on:
  push:
    tags:
      - 'api-types-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Нужен для provenance: GitHub выдаёт короткоживущий OIDC-токен, которым
      # npm подписывает происхождение пакета (кто и из какого коммита собрал).
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # Заставляет setup-node записать .npmrc с адресом реестра —
          # без этого npm publish не поймёт, куда слать и какой токен брать.
          registry-url: 'https://registry.npmjs.org'

      - name: Установка зависимостей
        run: npm ci

      - name: Тег должен совпадать с версией в package.json
        # Иначе тег api-types-v0.2.0 молча опубликовал бы 0.1.0.
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#api-types-v}"
          PKG_VERSION="$(node -p "require('./packages/api-types/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Тег $GITHUB_REF_NAME → версия $TAG_VERSION, а в package.json $PKG_VERSION"
            exit 1
          fi

      - name: Сборка типов из спеки
        run: npm run build:types

      - name: Публикация в npm
        run: npm publish --provenance --access public
        working-directory: packages/api-types
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
